<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAVE | Developer Portfolio</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <nav>
        <div class="logo">dave.sys</div>
        <ul class="nav-links">
            <li><a href="#about">About</a></li>
            <li><a href="#projects">Projects</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>

    <header class="hero">
        <div class="hero-content-left">
            <h1 class="genshin-text" data-profile-name></h1>
            <div class="subtitle-container">
                <span class="star-bullet">✦</span>
                <h2 class="changing-text" data-profile-role></h2>
            </div>
            <p class="hero-desc" data-profile-intro></p>
            <a href="#projects" class="btn-genshin">Explore Profile</a>
        </div>
    </header>

    <section id="about" class="section">
        <h3 class="section-title">Character Info</h3>
        <p class="section-text" data-profile-about></p>
        <div class="skills-container" data-skills></div>
    </section>

    <section id="projects" class="section alt-bg">
        <h3 class="section-title">Featured Quests</h3>
        <div class="projects-grid" data-projects></div>
    </section>

    <section id="contact" class="section">
        <h3 class="section-title">Co-Op / Connect</h3>
        <p class="section-text contact-intro">
            Ready to build something unique together? Drop a message below to initialize communication.
        </p>
        <form class="contact-form" data-contact-form>
            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Your Email" required>
            <textarea placeholder="Your Message Here..." rows="5" required></textarea>
            <button type="submit" class="btn-genshin form-btn">Send Message</button>
            <p class="form-status" data-form-status aria-live="polite"></p>
        </form>
    </section>

    <footer>
        <p>&copy; <span data-footer-text></span></p>
    </footer>

    <button class="scroll-top-btn" type="button" aria-label="Scroll to top" data-scroll-top>
        ↑
    </button>

    <script src="assets/js/data.js"></script>
    <script src="assets/js/app.js"></script>
</body>
</html>
