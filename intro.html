<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Intro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&display=swap');

        :root {
            --bg: #0f172a;
            --panel: rgba(15, 23, 42, 0.72);
            --text: #f8fafc;
            --muted: #cbd5e1;
            --accent: #38bdf8;
            --line: rgba(148, 163, 184, 0.28);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
        }

        body {
            display: grid;
            place-items: center;
            background:
                radial-gradient(circle at 50% 18%, rgba(56, 189, 248, 0.18), transparent 24rem),
                linear-gradient(145deg, #020617 0%, var(--bg) 58%, #111827 100%);
            color: var(--text);
            font-family: 'Inter', sans-serif;
        }

        .intro-stage {
            position: relative;
            display: grid;
            place-items: center;
            width: min(90vw, 760px);
            min-height: min(78vh, 520px);
            padding: 2rem;
        }

        .tool-icons {
            position: absolute;
            top: clamp(1.25rem, 5vh, 2.2rem);
            left: 50%;
            display: flex;
            gap: 0.9rem;
            opacity: 0;
            transform: translate(-50%, -10px);
            animation: icons-in 0.7s 0.2s ease forwards;
        }

        .tool-icon {
            display: grid;
            place-items: center;
            width: clamp(3rem, 9vw, 3.8rem);
            height: clamp(3rem, 9vw, 3.8rem);
            border: 1px solid var(--line);
            border-radius: 14px;
            background: rgba(15, 23, 42, 0.62);
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.24);
            backdrop-filter: blur(16px);
        }

        .tool-icon svg {
            width: 54%;
            height: 54%;
            fill: none;
            stroke: var(--muted);
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-width: 2.4;
        }

        .intro-status {
            position: absolute;
            top: 50%;
            left: 50%;
            width: min(17rem, 58vw);
            opacity: 0;
            transform: translate(-50%, -50%);
            animation: status-in 0.5s 0.85s ease forwards, status-out 0.45s 2.35s ease forwards;
        }

        .intro-status::before {
            content: "Initializing workspace";
            display: block;
            margin-bottom: 0.85rem;
            color: var(--muted);
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-align: center;
            text-transform: uppercase;
        }

        .status-track {
            display: block;
            width: 100%;
            height: 2px;
            overflow: hidden;
            border-radius: 999px;
            background-color: rgba(148, 163, 184, 0.22);
        }

        .status-track::after {
            content: "";
            display: block;
            width: 100%;
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, transparent, var(--accent), #e0f2fe);
            transform: translateX(-100%);
            animation: status-fill 1.45s 1s cubic-bezier(0.76, 0, 0.24, 1) forwards;
        }

        .welcome-copy {
            width: min(100%, 680px);
            text-align: center;
            opacity: 0;
            transform: translateY(18px);
            animation: text-in 0.75s 2.9s ease forwards;
        }

        .welcome-copy h1 {
            margin: 0;
            color: var(--text);
            font-size: clamp(2.35rem, 7vw, 5rem);
            line-height: 1.02;
            letter-spacing: 0;
            font-weight: 700;
        }

        .welcome-copy p {
            margin: 1rem auto 0;
            color: var(--muted);
            font-size: clamp(0.95rem, 2.6vw, 1.15rem);
            font-weight: 600;
        }

        .welcome-copy::after {
            content: "";
            display: block;
            width: min(11rem, 38vw);
            height: 2px;
            margin: 1.35rem auto 0;
            border-radius: 999px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
        }

        .intro-exit {
            animation: intro-fade-out 0.65s ease forwards;
        }

        @keyframes icons-in {
            to {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }

        @keyframes status-in {
            to {
                opacity: 1;
            }
        }

        @keyframes status-fill {
            to {
                transform: translateX(0);
            }
        }

        @keyframes status-out {
            to {
                opacity: 0;
                transform: translate(-50%, calc(-50% - 10px));
            }
        }

        @keyframes text-in {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes intro-fade-out {
            to {
                opacity: 0;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms;
                animation-delay: 0ms;
            }

            .tool-icons,
            .welcome-copy {
                opacity: 1;
                transform: translate(-50%, 0);
            }

            .welcome-copy {
                transform: none;
            }

            .intro-status {
                display: none;
            }
        }
    </style>
</head>
<body>
    <main class="intro-stage" aria-label="Welcome to my portfolio website">
        <div class="tool-icons" aria-label="Git, code, and 3D modeling icons">
            <span class="tool-icon" title="Git">
                <svg viewBox="0 0 48 48" aria-hidden="true">
                    <path d="M18 10h12v9h-12z"></path>
                    <path d="M24 19v7"></path>
                    <path d="M14 37h20"></path>
                    <path d="M24 26l-10 11"></path>
                    <path d="M24 26l10 11"></path>
                    <circle cx="24" cy="10" r="4"></circle>
                    <circle cx="14" cy="37" r="4"></circle>
                    <circle cx="34" cy="37" r="4"></circle>
                </svg>
            </span>
            <span class="tool-icon" title="Code">
                <svg viewBox="0 0 48 48" aria-hidden="true">
                    <path d="M18 16l-9 8 9 8"></path>
                    <path d="M30 16l9 8-9 8"></path>
                    <path d="M27 11l-6 26"></path>
                </svg>
            </span>
            <span class="tool-icon" title="3D Modeling">
                <svg viewBox="0 0 48 48" aria-hidden="true">
                    <path d="M24 6l16 9v18l-16 9-16-9v-18z"></path>
                    <path d="M24 24l16-9"></path>
                    <path d="M24 24l-16-9"></path>
                    <path d="M24 24v18"></path>
                </svg>
            </span>
        </div>

        <div class="intro-status" aria-hidden="true">
            <span class="status-track"></span>
        </div>

        <section class="welcome-copy">
            <h1>Welcome to my Portfolio Website</h1>
            <p>DAVE / Junior Web Developer</p>
        </section>
    </main>

    <script>
        const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        const exitDelay = prefersReducedMotion ? 500 : 5900;

        window.setTimeout(() => {
            document.body.classList.add("intro-exit");
        }, exitDelay);

        window.setTimeout(() => {
            window.parent.postMessage("portfolio-intro-complete", "*");
        }, exitDelay + 650);
    </script>
</body>
</html>
