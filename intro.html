<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Intro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&family=Poppins:wght@500;700&display=swap');

        :root {
            --bg: #fff3c9;
            --text: #2b2118;
            --line: #2b2118;
            --cream: #fffdf3;
            --gold: #ff9f1c;
            --sky: #70d6ff;
            --pink: #ff70a6;
            --mint: #9ef01a;
            --shadow: #2b2118;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
        }

        body {
            display: grid;
            place-items: center;
            background:
                radial-gradient(circle at 16% 18%, rgba(112, 214, 255, 0.45), transparent 15rem),
                radial-gradient(circle at 84% 78%, rgba(255, 112, 166, 0.42), transparent 16rem),
                linear-gradient(135deg, #fff1a8 0%, #ffcfdf 48%, #70d6ff 100%);
            color: var(--text);
            font-family: 'Poppins', sans-serif;
        }

        .intro-stage {
            position: relative;
            display: grid;
            place-items: center;
            width: min(92vw, 780px);
            min-height: min(82vh, 560px);
            padding: 2rem;
        }

        .tool-icons {
            position: absolute;
            top: clamp(1rem, 4vh, 2rem);
            left: 50%;
            display: flex;
            gap: clamp(0.65rem, 2vw, 1.1rem);
            transform: translateX(-50%);
            opacity: 0;
            animation: icons-drop 0.7s 0.25s ease forwards;
        }

        .tool-icon {
            display: grid;
            place-items: center;
            width: clamp(3.2rem, 11vw, 4.4rem);
            height: clamp(3.2rem, 11vw, 4.4rem);
            border: 3px solid var(--line);
            border-radius: 18px;
            background-color: var(--cream);
            box-shadow: 6px 6px 0 var(--shadow);
            transform: rotate(-4deg);
        }

        .tool-icon:nth-child(2) {
            background-color: var(--gold);
            transform: rotate(3deg);
        }

        .tool-icon:nth-child(3) {
            background-color: var(--mint);
            transform: rotate(-2deg);
        }

        .tool-icon svg {
            width: 58%;
            height: 58%;
            fill: none;
            stroke: var(--line);
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-width: 3.2;
        }

        .ball-shadow {
            position: absolute;
            top: calc(50% + 4.3rem);
            left: 50%;
            width: clamp(4.6rem, 15vw, 6.5rem);
            height: 1.1rem;
            border-radius: 50%;
            background-color: rgba(43, 33, 24, 0.28);
            filter: blur(1px);
            opacity: 0;
            transform: translateX(-50%) scale(0.35);
            animation: shadow-bounce 2.15s 0.4s ease-out forwards;
        }

        .drop-ball {
            position: absolute;
            top: 50%;
            left: 50%;
            display: grid;
            place-items: center;
            width: clamp(5.4rem, 18vw, 8rem);
            height: clamp(5.4rem, 18vw, 8rem);
            border: 4px solid var(--line);
            border-radius: 50%;
            background:
                radial-gradient(circle at 32% 26%, #ffffff 0 12%, transparent 13%),
                radial-gradient(circle at 68% 72%, rgba(43, 33, 24, 0.16), transparent 34%),
                var(--pink);
            box-shadow: 10px 10px 0 var(--shadow);
            color: var(--cream);
            font-family: 'Fredoka', sans-serif;
            font-size: clamp(1.8rem, 7vw, 3rem);
            font-weight: 700;
            transform: translate(-50%, -52vh) scale(0.88);
            animation: ball-bounce 2.15s 0.4s cubic-bezier(0.28, 0.84, 0.42, 1) forwards;
        }

        .welcome-copy {
            position: relative;
            z-index: 2;
            width: min(100%, 680px);
            margin-top: clamp(8rem, 25vh, 12rem);
            text-align: center;
            opacity: 0;
            transform: translateY(22px) scale(0.92);
            animation: text-arrive 0.65s 1.9s cubic-bezier(0.18, 0.82, 0.22, 1) forwards;
        }

        .welcome-copy h1 {
            margin: 0;
            color: var(--cream);
            font-family: 'Fredoka', sans-serif;
            font-size: clamp(2.2rem, 10vw, 5.4rem);
            line-height: 0.94;
            letter-spacing: 0;
            -webkit-text-stroke: 2px var(--line);
            paint-order: stroke fill;
            text-shadow:
                2px 2px 0 var(--line),
                5px 5px 0 var(--pink),
                8px 8px 0 rgba(43, 33, 24, 0.2);
        }

        .welcome-copy p {
            display: inline-block;
            margin: 1.1rem 0 0;
            border: 3px solid var(--line);
            border-radius: 999px;
            background-color: var(--gold);
            padding: 0.4rem 1rem;
            box-shadow: 5px 5px 0 var(--shadow);
            color: var(--text);
            font-family: 'Fredoka', sans-serif;
            font-size: clamp(0.85rem, 3vw, 1rem);
            font-weight: 700;
            text-transform: uppercase;
        }

        .intro-stage::before,
        .intro-stage::after {
            content: "";
            position: absolute;
            border: 3px solid var(--line);
            background-color: rgba(255, 253, 243, 0.52);
            box-shadow: 6px 6px 0 rgba(43, 33, 24, 0.18);
        }

        .intro-stage::before {
            bottom: 12%;
            left: 5%;
            width: clamp(2.8rem, 10vw, 4.6rem);
            height: clamp(2.8rem, 10vw, 4.6rem);
            border-radius: 18px;
            transform: rotate(-10deg);
        }

        .intro-stage::after {
            right: 5%;
            bottom: 18%;
            width: clamp(3rem, 11vw, 5rem);
            height: clamp(3rem, 11vw, 5rem);
            border-radius: 50%;
            transform: rotate(12deg);
        }

        .intro-exit {
            animation: intro-splash-out 0.7s cubic-bezier(0.76, 0, 0.24, 1) forwards;
        }

        @keyframes icons-drop {
            from {
                opacity: 0;
                transform: translate(-50%, -26px) scale(0.94);
            }

            to {
                opacity: 1;
                transform: translate(-50%, 0) scale(1);
            }
        }

        @keyframes ball-bounce {
            0% {
                transform: translate(-50%, -52vh) scale(0.88);
            }

            38% {
                transform: translate(-50%, -50%) scale(1.06, 0.92);
            }

            56% {
                transform: translate(-50%, -82%) scale(0.96, 1.05);
            }

            72% {
                transform: translate(-50%, -50%) scale(1.03, 0.95);
            }

            86% {
                transform: translate(-50%, -64%) scale(0.99, 1.02);
            }

            100% {
                transform: translate(-50%, -50%) scale(1);
            }
        }

        @keyframes shadow-bounce {
            0%,
            22% {
                opacity: 0;
                transform: translateX(-50%) scale(0.35);
            }

            38%,
            72%,
            100% {
                opacity: 1;
                transform: translateX(-50%) scale(1);
            }

            56%,
            86% {
                opacity: 0.55;
                transform: translateX(-50%) scale(0.66);
            }
        }

        @keyframes text-arrive {
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes intro-splash-out {
            to {
                opacity: 0;
                transform: scale(1.08);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms;
                animation-delay: 0ms;
            }

            .tool-icons,
            .welcome-copy {
                opacity: 1;
                transform: translateX(-50%);
            }

            .welcome-copy {
                transform: none;
            }

            .drop-ball {
                transform: translate(-50%, -50%);
            }
        }
    </style>
</head>
<body>
    <main class="intro-stage" aria-label="Welcome to my portfolio website">
        <div class="tool-icons" aria-label="Git, code, and 3D modeling icons">
            <span class="tool-icon" title="Git">
                <svg viewBox="0 0 48 48" aria-hidden="true">
                    <path d="M18 10h12v9h-12z"></path>
                    <path d="M24 19v7"></path>
                    <path d="M14 37h20"></path>
                    <path d="M24 26l-10 11"></path>
                    <path d="M24 26l10 11"></path>
                    <circle cx="24" cy="10" r="4"></circle>
                    <circle cx="14" cy="37" r="4"></circle>
                    <circle cx="34" cy="37" r="4"></circle>
                </svg>
            </span>
            <span class="tool-icon" title="Code">
                <svg viewBox="0 0 48 48" aria-hidden="true">
                    <path d="M18 16l-9 8 9 8"></path>
                    <path d="M30 16l9 8-9 8"></path>
                    <path d="M27 11l-6 26"></path>
                </svg>
            </span>
            <span class="tool-icon" title="3D Modeling">
                <svg viewBox="0 0 48 48" aria-hidden="true">
                    <path d="M24 6l16 9v18l-16 9-16-9v-18z"></path>
                    <path d="M24 24l16-9"></path>
                    <path d="M24 24l-16-9"></path>
                    <path d="M24 24v18"></path>
                </svg>
            </span>
        </div>

        <div class="ball-shadow" aria-hidden="true"></div>
        <div class="drop-ball" aria-hidden="true">D</div>

        <section class="welcome-copy">
            <h1>Welcome to my Portfolio Website</h1>
            <p>DAVE / Junior Web Developer</p>
        </section>
    </main>

    <script>
        const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        const exitDelay = prefersReducedMotion ? 500 : 5600;

        window.setTimeout(() => {
            document.body.classList.add("intro-exit");
        }, exitDelay);

        window.setTimeout(() => {
            window.parent.postMessage("portfolio-intro-complete", "*");
        }, exitDelay + 700);
    </script>
</body>
</html>
